services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ../avito-back/server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ../avito-back/server/.env
    volumes:
      - ../avito-back/server:/app
      - /app/node_modules
